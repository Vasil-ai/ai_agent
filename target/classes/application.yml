spring:
  application:
    name: ai-agent

  datasource:
    url: jdbc:h2:file:./data/ai_agent_db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# LLM configuration (llama.cpp server)
llm:
  base-url: http://localhost:8080
  model: Ministral-3-3B-Instruct-2512-Q5_K_M.gguf
  temperature: 0.7
  max-tokens: 2048
  max-iterations: 10
  connect-timeout-seconds: 10
  read-timeout-seconds: 120

# Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.aiagent: DEBUG
    org.springframework.web: INFO

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_agent
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false

llm:
  base-url: ${LLM_BASE_URL:http://localhost:8080}

logging:
  level:
    com.aiagent: INFO
